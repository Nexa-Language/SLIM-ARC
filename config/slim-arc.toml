# SLIM-ARC 配置文件

[models]
# 测试模型（与论文一致）
dense = "data/models/Qwen3-4B-Q4_K_M.gguf"           # Dense, 2.4GB
moe_small = "data/models/olmoe-1b-7b-0924-instruct-q4_k_m.gguf"  # MoE, 3.9GB
moe_large_q4km = "data/models/Qwen3-Next-80B-A3B-Instruct-Q4_K_M.gguf"  # MoE, 45GB
moe_large_iq4xs = "data/models/Qwen3-Next-80B-A3B-Instruct-IQ4_XS.gguf"  # MoE, 40GB

[benchmarks]
# 精度基准
gsm8k = "data/benchmarks/gsm8k/gsm8k_test.jsonl"      # GSM8K 8-shot
# WikiText PPL 使用 llama-perplexity 内置数据

[prefetch]
n_threads = 2          # 预取线程数
window_prefill = 4     # prefill 阶段预取窗口
window_decode = 1      # decode 阶段预取窗口
madv_threshold_gb = 6  # 大于此值才设 MADV_RANDOM

[kv_cache]
type_k = "q4_0"        # KV Cache K 量化类型
type_v = "q4_0"        # KV Cache V 量化类型
evict_sink = 4         # attention sink token 数
evict_window = 1024    # KV 滑动窗口大小

[unified_scheduler]
total_bandwidth_gb = 1 # 总 I/O 带宽预算（GB/s）
enabled = false        # 统一调度器当前默认关闭（待深度集成）
